<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1a0810"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF1A6C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF1A6C" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bgGrad)"/>
  <rect width="400" height="560" fill="url(#pinkGlow)"/>

  <!-- Grid texture -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FF1A6C" stroke-width="0.25" stroke-opacity="0.07"/>
  </pattern>
  <rect width="400" height="560" fill="url(#grid)"/>

  <!-- TOP PINK BAR -->
  <rect x="0" y="0" width="400" height="130" fill="#FF1A6C"/>

  <!-- Top bar texture lines -->
  <line x1="0" y1="115" x2="400" y2="115" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="0" y1="122" x2="400" y2="122" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Sparkle top bar -->
  <text x="30" y="28" font-size="14" fill="rgba(255,255,255,0.4)">✦</text>
  <text x="355" y="28" font-size="10" fill="rgba(255,255,255,0.3)">✦</text>
  <text x="185" y="18" font-size="8" fill="rgba(255,255,255,0.25)">✦</text>

  <!-- FALLS GIRL headline in top bar -->
  <text x="200" y="72" font-family="Arial Black, sans-serif" font-weight="900" font-size="58"
    fill="white" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">FALLS GIRL</text>
  <text x="200" y="100" font-family="Arial, sans-serif" font-weight="300" font-size="13"
    fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="7">CLEANING CO.</text>
  <text x="200" y="118" font-family="Arial, sans-serif" font-size="9"
    fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="3">SIOUX FALLS, SOUTH DAKOTA</text>

  <!-- BORDER FRAME -->
  <rect x="18" y="148" width="364" height="394" rx="6"
    fill="none" stroke="#FF1A6C" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Corner diamonds -->
  <polygon points="18,148 24,154 18,160 12,154" fill="#FF1A6C" opacity="0.7"/>
  <polygon points="382,148 388,154 382,160 376,154" fill="#FF1A6C" opacity="0.7"/>
  <polygon points="18,542 24,536 18,530 12,536" fill="#FF1A6C" opacity="0.7"/>
  <polygon points="382,542 388,536 382,530 376,536" fill="#FF1A6C" opacity="0.7"/>

  <!-- HOOK LINE -->
  <text x="200" y="185" font-family="Arial Black, sans-serif" font-size="14"
    fill="#FF1A6C" text-anchor="middle" letter-spacing="0.5">Airbnb host? We need to meet. 👋</text>

  <!-- Divider under hook -->
  <line x1="40" y1="196" x2="360" y2="196" stroke="#FF1A6C" stroke-width="0.75" stroke-opacity="0.35"/>

  <!-- SERVICE BULLETS -->
  <g font-family="Arial, sans-serif" font-size="13" fill="#cccccc">
    <text x="52" y="222">✓  Airbnb &amp; short-term rental specialists</text>
    <text x="52" y="244">✓  Same-day &amp; rapid turnovers available</text>
    <text x="52" y="266">✓  Reliable — we show up every single time</text>
    <text x="52" y="288">✓  Locally owned, Sioux Falls born</text>
    <text x="52" y="310">✓  Before/after photos sent every clean</text>
  </g>

  <!-- Checkmarks in pink -->
  <g font-family="Arial, sans-serif" font-size="13" fill="#FF1A6C" font-weight="700">
    <text x="52" y="222">✓</text>
    <text x="52" y="244">✓</text>
    <text x="52" y="266">✓</text>
    <text x="52" y="288">✓</text>
    <text x="52" y="310">✓</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#cccccc">
    <text x="68" y="222">  Airbnb &amp; short-term rental specialists</text>
    <text x="68" y="244">  Same-day &amp; rapid turnovers available</text>
    <text x="68" y="266">  Reliable — we show up every single time</text>
    <text x="68" y="288">  Locally owned, Sioux Falls born</text>
    <text x="68" y="310">  Before/after photos sent every clean</text>
  </g>

  <!-- OFFER BOX -->
  <rect x="36" y="326" width="328" height="58" rx="5"
    fill="rgba(255,26,108,0.1)" stroke="#FF1A6C" stroke-width="1" stroke-dasharray="5,3" stroke-opacity="0.5"/>
  <text x="200" y="346" font-family="Arial, sans-serif" font-size="9"
    fill="#FF1A6C" text-anchor="middle" letter-spacing="4">✦ LIMITED INTRO OFFER ✦</text>
  <text x="200" y="370" font-family="Arial Black, sans-serif" font-size="20"
    fill="white" text-anchor="middle" letter-spacing="1">First Clean — 20% Off</text>

  <!-- DIVIDER -->
  <line x1="40" y1="398" x2="360" y2="398" stroke="#FF1A6C" stroke-width="0.75" stroke-opacity="0.25"/>

  <!-- QR CODE + CONTACT split layout -->
  <!-- QR code on left -->
  <rect x="36" y="410" width="110" height="110" rx="6" fill="white" />
  <image x="40" y="414" width="102" height="102" href="data:image/png;base64,"/>

  <!-- Contact info right of QR -->
  <text x="165" y="430" font-family="Arial, sans-serif" font-size="9"
    fill="#666" letter-spacing="2.5">SCAN TO BOOK</text>
  <line x1="165" y1="435" x2="370" y2="435" stroke="#FF1A6C" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="165" y="456" font-family="Arial Black, sans-serif" font-size="12"
    fill="#FF1A6C" letter-spacing="0">thefallsgirl@yahoo.com</text>

  <text x="165" y="476" font-family="Arial, sans-serif" font-size="11"
    fill="#aaaaaa" letter-spacing="0">@FallsGirlCleaning</text>
  <text x="165" y="492" font-family="Arial, sans-serif" font-size="10"
    fill="#666">Instagram &amp; Facebook</text>

  <text x="165" y="513" font-family="Arial, sans-serif" font-size="10"
    fill="#555">Text or call to book:</text>
  <text x="165" y="530" font-family="Arial Black, sans-serif" font-size="13"
    fill="white">(605) 501-8464</text>

  <!-- FOOTER STRIPE -->
  <rect x="0" y="542" width="400" height="18" fill="#FF1A6C" opacity="0.85"/>
  <text x="200" y="554" font-family="Arial, sans-serif" font-size="8"
    fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2.5">
    "WE CLEAN UP AFTER EVERYONE ELSE'S GOOD TIME."  ✦  A BPB LLC COMPANY
  </text>

</svg>
